syntax = "proto3";
package zeek_runner;
option go_package = "zeek_runner/api/pb";

// 请求体
message AnalyzeRequest {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  bool onlyNotice = 3;         // 是否只生成notice日志
  string pcapID = 4;           // pcap文件ID
  string pcapPath = 5;         // pcap文件路径
  string scriptID = 6;         // 脚本ID
  string scriptPath = 7;       // 脚本路径
}

// 响应体
message AnalyzeResponse {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string pcapPath = 3;         // pcap文件路径
  string scriptPath = 4;       // 脚本路径
  string startTime = 5;        // 任务开始时间
}

// 文件提取请求
message ExtractRequest {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string pcapID = 3;           // pcap文件ID
  string pcapPath = 4;         // pcap文件路径
  string scriptPath = 5;       // 脚本路径（可选，绝对路径）
  string outputDir = 6;        // 提取文件存储路径
  int32 extractedFileMinSize = 7;// 提取文件最小大小(KB)
  int32 extractedFileMaxSize = 8;// 提取文件最大大小(MB)
}

// 文件提取响应
message ExtractResponse {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string pcapPath = 3;         // pcap文件路径
  string scriptPath = 4;       // 脚本路径
  string outputDir = 5;        // 提取文件存储路径
  string startTime = 6;        // 任务开始时间
}

// 容量检查请求
message CapacityCheckRequest {}

// 容量检查响应：仅暴露真实可用于背压的字段
message CapacityCheckResponse {
  bool accepting_jobs = 1;       // 是否仍在接收任务

  int32 pool_running = 2;        // ants worker pool 实际运行量
  int32 pool_capacity = 3;       // ants worker pool 容量

  int32 weighted_running = 4;    // 当前异步 batch 已占用的本地资源权重
  int32 weighted_capacity = 5;   // 本地权重上限

  int64 queue_pending = 6;       // Redis Stream 中未领取的真实等待量 (XLEN - XPENDING)
  string timestamp = 7;
}

// 版本检查请求
message VersionCheckRequest {
  string component = 1;        // 组件名称，目前支持 zeek
}

// 版本检查响应
message VersionCheckResponse {
  string component = 1;        // 组件名称
  string version = 2;          // 版本信息
}

message ZeekSyntaxCheckRequest {
  string scriptID = 1;         // 脚本ID
  string scriptPath = 2;       // 脚本路径
  string scriptContent = 3;    // 脚本内容
}

message ZeekSyntaxCheckResponse {
  bool valid = 1;              // 是否有效
  string error = 2;            // 错误信息
}

message AsyncAnalyzeRequest {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  bool onlyNotice = 3;         // 是否只生成notice日志
  string pcapID = 4;           // pcap文件ID
  string pcapPath = 5;         // pcap文件路径
  string scriptID = 6;         // 脚本ID
  string scriptPath = 7;       // 脚本路径
}

// 异步分析响应
message AsyncAnalyzeResponse {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string status = 3;           // 任务状态
  string createTime = 4;       // 创建时间
}

message ScriptTask {
  string uuid = 1;             // 子任务UUID
  string scriptID = 2;         // 脚本ID
  string scriptPath = 3;       // 脚本路径（可选，优先使用托管脚本）
  string runMode = 4;          // 运行模式：scan/intel/extract
  int32 weight = 5;            // 调度权重
}

message AsyncAnalyzeBatchRequest {
  string taskID = 1;           // 父任务ID
  string pcapID = 2;           // pcap文件ID
  string pcapPath = 3;         // pcap文件路径
  bool onlyNotice = 4;         // 是否只生成notice日志
  repeated ScriptTask scripts = 5; // 脚本任务列表
}

message AsyncAnalyzeBatchResponse {
  string taskID = 1;           // 父任务ID
  int32 acceptedCount = 2;     // 已接受子任务数
  int32 rejectedCount = 3;     // 拒绝子任务数
  string status = 4;           // 状态
}

// 异步文件提取请求
message ExtractAsyncRequest {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string pcapID = 3;           // pcap文件ID
  string pcapPath = 4;         // pcap文件路径
  string scriptPath = 5;       // 脚本路径（可选，绝对路径）
  string outputDir = 6;        // 提取文件存储路径
  int32 extractedFileMinSize = 7;// 提取文件最小大小(KB)
  int32 extractedFileMaxSize = 8;// 提取文件最大大小(MB)
}

// 异步文件提取响应
message ExtractAsyncResponse {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string status = 3;           // 任务状态
  string createTime = 4;       // 创建时间
}

// 任务状态查询请求
message TaskStatusRequest {
  string uuid = 1;             // 子任务UUID
}

// 任务状态查询响应
message TaskStatusResponse {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string pcapID = 3;           // pcap文件ID
  string pcapPath = 4;         // pcap文件路径
  string scriptID = 5;         // 脚本ID
  string scriptPath = 6;       // 脚本路径
  string status = 7;           // 任务状态
  string createTime = 8;       // 创建时间
  string startTime = 9;        // 开始时间
  string endTime = 10;         // 结束时间
  double duration = 11;        // 执行时长(秒)
  int32 hitCount = 12;         // 命中总数
  int32 noticeCount = 13;      // notice日志数
  int32 intelCount = 14;       // intel日志数
  string error = 15;           // 错误信息
  string output = 16;          // 输出内容
  int32 retries = 17;          // 重试次数
}

// 父任务状态查询请求
message ParentTaskStatusRequest {
  string taskID = 1;           // 父任务ID
}

// 子任务摘要
message SubTaskSummary {
  string uuid = 1;             // 子任务UUID
  string scriptID = 2;         // 脚本ID
  string scriptPath = 3;       // 脚本路径
  string status = 4;           // 状态
  double duration = 5;         // 执行时长(秒)
  string error = 6;            // 错误信息
  int32 hitCount = 7;          // 命中总数
  int32 noticeCount = 8;       // notice日志数
  int32 intelCount = 9;        // intel日志数
}

// 父任务状态查询响应
message ParentTaskStatusResponse {
  string taskID = 1;           // 父任务ID
  int32 totalCount = 2;        // 总子任务数
  int32 pendingCount = 3;      // 待处理数
  int32 runningCount = 4;      // 运行中数
  int32 successCount = 5;      // 成功数
  int32 failedCount = 6;       // 失败数
  int32 timeoutCount = 7;      // 超时数
  string status = 8;           // 聚合状态: pending/running/completed/partial_failed/failed
  repeated SubTaskSummary subTasks = 9; // 子任务列表
  int32 hitCount = 10;         // 所有子任务命中总数
  int32 noticeCount = 11;      // 所有子任务notice日志总数
  int32 intelCount = 12;       // 所有子任务intel日志总数
}

message ListScriptsRequest {
  string name = 1;
  bool enabledOnly = 2;
}

message ScriptInfo {
  string scriptID = 1;
  string scriptName = 2;
  string scriptPath = 3;
  string expCodeType = 4;
  string size = 5;
  string behaviorType = 6;
  string behaviorCategory = 7;
  string description = 8;
  string attackFeature = 9;
  string checksum = 10;
  string updatedAt = 11;
  bool enabled = 12;
  bool valid = 13;
  string error = 14;
  repeated string noticeTypes = 15;
}

message ListScriptsResponse {
  repeated ScriptInfo scripts = 1;
}

message GetScriptRequest {
  string scriptID = 1;
}

message ReloadScriptsRequest {}

message ReloadScriptsResponse {
  int32 total = 1;
  int32 valid = 2;
  int32 invalid = 3;
  repeated ScriptInfo scripts = 4;
}

// 行为规则策略由外部控制面下发。规则 YAML 的内容与 SHA 不变，
// 仅按厂商配置状态过滤运行时行为规则。
message ApplyBehaviorPolicyRequest {
  repeated string disabled_vendor_ids = 1;
  string policy_version = 2;
}

message ApplyBehaviorPolicyResponse {
  int32 effective_rule_count = 1;
  repeated string disabled_vendor_ids = 2;
  string ruleset_sha256 = 3;
}

// 任务命中详情查询请求
message GetTaskHitsRequest {
  string uuid = 1;             // 子任务UUID
  string taskID = 2;           // 父任务ID（可选，按父任务查询所有子任务命中）
  string sourceType = 3;       // 过滤：notice 或 intel（可选）
  int32 limit = 4;             // 返回数量限制（默认100）
}

// 单条命中事件
message HitEvent {
  string eventID = 1;
  string eventType = 2;
  string eventTime = 3;
  string taskID = 4;
  string uuid = 5;
  string pcapID = 6;
  string pcapPath = 7;
  string scriptID = 8;
  string scriptPath = 9;
  string verdict = 10;
  string sourceType = 11;      // notice 或 intel
  string ruleType = 12;        // notice类型 或 intel where
  string ruleName = 13;
  string message = 14;
  string indicator = 15;
  string srcIp = 16;
  int32 srcPort = 17;
  string dstIp = 18;
  int32 dstPort = 19;
  string proto = 20;
  string uid = 21;
}

// 任务命中详情查询响应
message GetTaskHitsResponse {
  string uuid = 1;
  string taskID = 2;
  int32 totalCount = 3;
  repeated HitEvent hits = 4;
}

// gRPC服务定义
service ZeekAnalysisService {
  rpc Analyze(AnalyzeRequest) returns (AnalyzeResponse) {}
  rpc AsyncAnalyze(AsyncAnalyzeRequest) returns (AsyncAnalyzeResponse) {}
  rpc AsyncAnalyzeBatch(AsyncAnalyzeBatchRequest) returns (AsyncAnalyzeBatchResponse) {}
  rpc Extract(ExtractRequest) returns (ExtractResponse) {}
  rpc ExtractAsync(ExtractAsyncRequest) returns (ExtractAsyncResponse) {}
  rpc GetTaskStatus(TaskStatusRequest) returns (TaskStatusResponse) {}
  rpc GetParentTaskStatus(ParentTaskStatusRequest) returns (ParentTaskStatusResponse) {}
  rpc CapacityCheck(CapacityCheckRequest) returns (CapacityCheckResponse) {}
  rpc VersionCheck(VersionCheckRequest) returns (VersionCheckResponse) {}
  rpc ZeekSyntaxCheck(ZeekSyntaxCheckRequest) returns (ZeekSyntaxCheckResponse) {}
  rpc ListScripts(ListScriptsRequest) returns (ListScriptsResponse) {}
  rpc GetScript(GetScriptRequest) returns (ScriptInfo) {}
  rpc ReloadScripts(ReloadScriptsRequest) returns (ReloadScriptsResponse) {}
  rpc ApplyBehaviorPolicy(ApplyBehaviorPolicyRequest) returns (ApplyBehaviorPolicyResponse) {}
  rpc GetTaskHits(GetTaskHitsRequest) returns (GetTaskHitsResponse) {}
}
