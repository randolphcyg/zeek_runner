syntax = "proto3";
package zeek_runner;
option go_package = "zeek_runner/api/pb";

// 请求体
message AnalyzeRequest {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  bool onlyNotice = 3;         // 是否只生成notice日志
  string pcapID = 4;           // pcap文件ID
  string pcapPath = 5;         // pcap文件路径
  string scriptID = 6;         // 脚本ID
  string scriptPath = 7;       // 脚本路径
}

// 响应体
message AnalyzeResponse {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string pcapPath = 3;         // pcap文件路径
  string scriptPath = 4;       // 脚本路径
  string startTime = 5;        // 任务开始时间
}

// 文件提取请求
message ExtractRequest {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string pcapID = 3;           // pcap文件ID
  string pcapPath = 4;         // pcap文件路径
  string scriptPath = 5;       // 脚本路径（可选，绝对路径）
  string outputDir = 6;        // 提取文件存储路径
  int32 extractedFileMinSize = 7;// 提取文件最小大小(KB)
  int32 extractedFileMaxSize = 8;// 提取文件最大大小(MB)
}

// 文件提取响应
message ExtractResponse {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string pcapPath = 3;         // pcap文件路径
  string scriptPath = 4;       // 脚本路径
  string outputDir = 5;        // 提取文件存储路径
  string startTime = 6;        // 任务开始时间
}

// 健康检查请求
message HealthCheckRequest {}

// 健康检查响应
message HealthCheckResponse {
  string status = 1;
  int32 pool_running = 2;
  int32 pool_capacity = 3;
  bool kafka_ready = 4;
  string timestamp = 5;
  string version = 6;
  string go_version = 7;
  string os = 8;
  string arch = 9;
  bool redis_ready = 10;
}

// 版本检查请求
message VersionCheckRequest {
  string component = 1;        // 组件名称 (zeek 或 zeek-kafka)
}

// 版本检查响应
message VersionCheckResponse {
  string component = 1;        // 组件名称
  string version = 2;          // 版本信息
}

message ZeekSyntaxCheckRequest {
  string script_path = 1;      // 脚本路径
  string script_content = 2;   // 脚本内容
}

message ZeekSyntaxCheckResponse {
  bool valid = 1;              // 是否有效
  string error = 2;            // 错误信息
}

message AsyncAnalyzeRequest {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  bool onlyNotice = 3;         // 是否只生成notice日志
  string pcapID = 4;           // pcap文件ID
  string pcapPath = 5;         // pcap文件路径
  string scriptID = 6;         // 脚本ID
  string scriptPath = 7;       // 脚本路径
}

// 异步分析响应
message AsyncAnalyzeResponse {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string status = 3;           // 任务状态
  string createTime = 4;       // 创建时间
}

// 异步文件提取请求
message ExtractAsyncRequest {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string pcapID = 3;           // pcap文件ID
  string pcapPath = 4;         // pcap文件路径
  string scriptPath = 5;       // 脚本路径（可选，绝对路径）
  string outputDir = 6;        // 提取文件存储路径
  int32 extractedFileMinSize = 7;// 提取文件最小大小(KB)
  int32 extractedFileMaxSize = 8;// 提取文件最大大小(MB)
}

// 异步文件提取响应
message ExtractAsyncResponse {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string status = 3;           // 任务状态
  string createTime = 4;       // 创建时间
}

// 任务状态查询请求
message TaskStatusRequest {
  string uuid = 1;             // 子任务UUID
}

// 任务状态查询响应
message TaskStatusResponse {
  string taskID = 1;           // 任务ID
  string uuid = 2;             // UUID
  string pcapID = 3;           // pcap文件ID
  string pcapPath = 4;         // pcap文件路径
  string scriptID = 5;         // 脚本ID
  string scriptPath = 6;       // 脚本路径
  string status = 7;           // 任务状态
  string createTime = 8;       // 创建时间
  string startTime = 9;        // 开始时间
  string endTime = 10;         // 结束时间
  double duration = 11;        // 执行时长(秒)
  int32 hitCount = 12;         // 命中总数
  int32 noticeCount = 13;      // notice日志数
  int32 intelCount = 14;       // intel日志数
  string error = 15;           // 错误信息
  string output = 16;          // 输出内容
  int32 retries = 17;          // 重试次数
}

// 父任务状态查询请求
message ParentTaskStatusRequest {
  string taskID = 1;           // 父任务ID
}

// 子任务摘要
message SubTaskSummary {
  string uuid = 1;             // 子任务UUID
  string scriptID = 2;         // 脚本ID
  string scriptPath = 3;       // 脚本路径
  string status = 4;           // 状态
  double duration = 5;         // 执行时长(秒)
  string error = 6;            // 错误信息
  int32 hitCount = 7;          // 命中总数
  int32 noticeCount = 8;       // notice日志数
  int32 intelCount = 9;        // intel日志数
}

// 父任务状态查询响应
message ParentTaskStatusResponse {
  string taskID = 1;           // 父任务ID
  int32 totalCount = 2;        // 总子任务数
  int32 pendingCount = 3;      // 待处理数
  int32 runningCount = 4;      // 运行中数
  int32 successCount = 5;      // 成功数
  int32 failedCount = 6;       // 失败数
  int32 timeoutCount = 7;      // 超时数
  string status = 8;           // 聚合状态: pending/running/completed/partial_failed/failed
  repeated SubTaskSummary subTasks = 9; // 子任务列表
  int32 hitCount = 10;         // 所有子任务命中总数
  int32 noticeCount = 11;      // 所有子任务notice日志总数
  int32 intelCount = 12;       // 所有子任务intel日志总数
}

// gRPC服务定义
service ZeekAnalysisService {
  rpc Analyze(AnalyzeRequest) returns (AnalyzeResponse) {}
  rpc AsyncAnalyze(AsyncAnalyzeRequest) returns (AsyncAnalyzeResponse) {}
  rpc Extract(ExtractRequest) returns (ExtractResponse) {}
  rpc ExtractAsync(ExtractAsyncRequest) returns (ExtractAsyncResponse) {}
  rpc GetTaskStatus(TaskStatusRequest) returns (TaskStatusResponse) {}
  rpc GetParentTaskStatus(ParentTaskStatusRequest) returns (ParentTaskStatusResponse) {}
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse) {}
  rpc VersionCheck(VersionCheckRequest) returns (VersionCheckResponse) {}
  rpc ZeekSyntaxCheck(ZeekSyntaxCheckRequest) returns (ZeekSyntaxCheckResponse) {}
}