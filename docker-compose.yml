x-logging-default: &logging-default
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

x-logging-infra: &logging-infra
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

x-zeek-runner-common: &zeek-runner-common
  image: zeek_runner:latest
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy
  volumes: &zeek-runner-volumes
    - ./pcaps:/opt/zeek_runner/pcaps
    - ./scripts:/opt/zeek_runner/scripts:ro
    - ./file_extract_script:/opt/zeek_runner/file_extract_script:ro
    - ./extracted:/opt/zeek_runner/extracted
    - ./custom:/usr/local/zeek/share/zeek/base/custom:ro
    - ./config.local.yaml:/opt/zeek_runner/config.yaml:ro
  logging: *logging-default
  healthcheck:
    test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8000/api/v1/healthz"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 10s

services:
  redis:
    image: redis:8-alpine
    container_name: zeek_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    logging: *logging-infra
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "xx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zeek_runner:
    <<: *zeek-runner-common
    deploy:
      replicas: ${ZEEK_RUNNER_REPLICAS:-3}
    expose:
      - "8000"
      - "50051"

  nginx:
    image: nginx:1.28-alpine
    container_name: zeek_nginx
    restart: unless-stopped
    depends_on:
      zeek_runner:
        condition: service_started
    ports:
      - "18080:80"
      - "50050:50050"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    logging: *logging-infra
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
