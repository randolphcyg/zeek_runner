services:
  redis:
    image: redis:8-alpine
    container_name: zeek_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-zeek_redis_1949}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-zeek_redis_1949}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zeek_runner_1:
    image: zeek_runner:latest
    container_name: zeek_runner_1
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
      - "50051:50051"
    volumes:
      - ./pcaps:/opt/zeek_runner/pcaps
      - ./scripts:/opt/zeek_runner/scripts
      - ./extracted:/opt/zeek_runner/extracted
      - ./custom/config.zeek:/usr/local/zeek/share/zeek/base/custom/config.zeek
      - ./config.yaml:/opt/zeek_runner/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  zeek_runner_2:
    image: zeek_runner:latest
    container_name: zeek_runner_2
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8002:8000"
      - "50052:50051"
    volumes:
      - ./pcaps:/opt/zeek_runner/pcaps
      - ./scripts:/opt/zeek_runner/scripts
      - ./extracted:/opt/zeek_runner/extracted
      - ./custom/config.zeek:/usr/local/zeek/share/zeek/base/custom/config.zeek
      - ./config.yaml:/opt/zeek_runner/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  zeek_runner_3:
    image: zeek_runner:latest
    container_name: zeek_runner_3
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8003:8000"
      - "50053:50051"
    volumes:
      - ./pcaps:/opt/zeek_runner/pcaps
      - ./scripts:/opt/zeek_runner/scripts
      - ./extracted:/opt/zeek_runner/extracted
      - ./custom/config.zeek:/usr/local/zeek/share/zeek/base/custom/config.zeek
      - ./config.yaml:/opt/zeek_runner/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.28-alpine
    container_name: zeek_nginx
    restart: unless-stopped
    depends_on:
      - zeek_runner_1
      - zeek_runner_2
      - zeek_runner_3
    ports:
      - "80:80"
      - "50050:50050"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
