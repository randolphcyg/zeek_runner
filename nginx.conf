events {
    worker_connections 10240;
}

http {
    upstream zeek_http {
        least_conn;
        server zeek_runner_1:8000 weight=1;
        server zeek_runner_2:8000 weight=1;
        server zeek_runner_3:8000 weight=1;
    }

    server {
        listen 80;
        
        location / {
            proxy_pass http://zeek_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            
            client_max_body_size 100m;
        }
        
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}

stream {
    upstream zeek_grpc {
        least_conn;
        server zeek_runner_1:50051 weight=1;
        server zeek_runner_2:50051 weight=1;
        server zeek_runner_3:50051 weight=1;
    }

    server {
        listen 50050;
        proxy_pass zeek_grpc;
        proxy_connect_timeout 10s;
        proxy_timeout 600s;
    }
}
