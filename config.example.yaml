redis:
  addr: "192.168.x.xx:6380"
  password: "change-me-in-production"
  db: 1
  poolSize: 100
  minIdleConns: 10
  maxRetries: 3
  dialTimeout: "5s"
  readTimeout: "3s"
  writeTimeout: "3s"
  poolTimeout: "4s"
  connMaxLifetime: "30m"
  connMaxIdleTime: "10m"

kafka:
  brokers: "192.168.x.xx:9092"
  saslMechanism: "PLAIN"                  # SASL 认证机制，为空则不启用认证
  saslUsername: "kafka"                   # SASL 认证用户名
  saslPassword: "change-me-in-production" # SASL 认证密码

pool:
  size: 80                                    # worker 池容量，生产环境建议 >= weightedCapacity
  maxBlocking: 10000                          # worker 池阻塞提交上限
  timeoutMinutes: 10                          # 单个 Zeek 执行超时时间(分钟)

scheduler:
  weightedCapacity: 170                        # 副本可同时运行的资源权重容量；17脚本/batch时支持每副本并发10个batch
  maxClaimBatch: 1                            # 单轮从 Redis Stream 主动拉取的 batch job 数量
  leaseTimeout: "2m"                         # Redis Stream pending 任务可被其他副本 reclaim 的最小空闲时间
  kafkaLagHighWatermark: 0                    # Kafka lag 背压阈值，0 表示不因 lag 停止领取任务
  minFreeDiskPercent: 5                       # 磁盘剩余空间低于该百分比时停止领取新任务

batch:
  enabled: true                               # 同一 pcap 的可归因脚本合并为一次 Zeek batch 执行
  maxScriptsPerZeekRun: 16                    # 单次 Zeek batch 最多加载的检测脚本数

rateLimit:
  limit: 2000
  window: 60

http:
  host: "0.0.0.0"
  port: 8000
  timeout: "60s"
  authTokens:
    - "your-token-here"

grpc:
  host: "0.0.0.0"
  port: 50051
  timeout: "300s"
  maxRecvMsgSize: 16777216
  maxSendMsgSize: 16777216
  enableReflection: true
  enableHealthCheck: true
  authTokens:
    - "your-token-here"

zeek:
  extractPath: "/opt/zeek_runner/extracted"   # 文件提取保存路径
  minSizeKB: 20                               # 最小提取文件大小 (KB)
  maxSizeMB: 200                              # 最大提取文件大小 (MB)
  scriptRoot: "/opt/zeek_runner/scripts"      # 检测脚本目录
  autoReloadScripts: true                     # 自动监听托管脚本变更并重载脚本元数据
  scriptReloadDebounce: "2s"                  # 文件事件合并等待时间
  scriptReloadInterval: "60s"                 # 定时兜底重扫间隔

behavior:
  rulesPath: "/opt/zeek_runner/rules/behavior_runtime.example.yaml"  # 行为识别规则 YAML；可基于 rules/behavior_runtime.example.yaml 自定义
  required: true                                               # 缺失或校验失败时拒绝就绪
  archiveEnabled: false                                       # 启用命中载荷加密归档
  archiveDir: "/opt/zeek_runner/archive"                     # 归档存储目录
  archiveKeyHex: "319aeb9e2163d8a97f06f761e3328c384f39e86a6d3c290113519a71578ac263"  # AES-256 密钥（64 位十六进制），生产环境务必更换
  archiveRetention: 30                                       # 归档保留天数（默认 30）

otel:
  enabled: false
  endpoint: "192.168.x.xx:14317"
