redis:
  addr: "redis:6379"
  password: "change-me-in-production"
  db: 2

kafka:
  brokers: "192.168.1.12:9092"
  topic: "zeek_logs"

pool:
  size: 8
  maxBlocking: 10000
  timeoutMinutes: 10

rateLimit:
  limit: 2000
  window: 60

http:
  host: "0.0.0.0"
  port: 8000
  timeout: "60s"
  authTokens:
    - "your-token-here"

grpc:
  host: "0.0.0.0"
  port: 50051
  timeout: "300s"
  maxRecvMsgSize: 16777216
  maxSendMsgSize: 16777216
  enableReflection: true
  enableHealthCheck: true
  authTokens:
    - "your-token-here"

file:
  extractPath: "/opt/zeek_runner/extracted"
  minSizeKB: 20
