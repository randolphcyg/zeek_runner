redis:
  addr: "localhost:6379"
  password: "your-redis-password-here"
  db: 0

kafka:
  brokers: "192.168.2.6:9092"
  topic: "zeek_logs"

pool:
  size: 16
  maxBlocking: 10000
  timeoutMinutes: 10

rateLimit:
  limit: 2000
  window: 60

auth:
  tokens:
    - "token1-change-me"
    - "token2-change-me"

server:
  http: ":8000"
  grpc: ":50051"

file:
  extractPath: "/opt/zeek_runner/extracted"
  minSizeKB: 20
