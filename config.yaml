redis:
  addr: "192.168.xx.xx:6379"
  password: "xx"
  db: 1
  poolSize: 100
  minIdleConns: 10
  maxRetries: 3
  dialTimeout: "5s"
  readTimeout: "3s"
  writeTimeout: "3s"
  poolTimeout: "4s"
  connMaxLifetime: "30m"
  connMaxIdleTime: "10m"

kafka:
  brokers: "192.168.xx.xx:9092"
  topic: "zeek_logs"

pool:
  size: 8
  maxBlocking: 10000
  timeoutMinutes: 10

rateLimit:
  limit: 2000
  window: 60

http:
  host: "0.0.0.0"
  port: 8000
  timeout: "60s"
  authTokens:
    - "token-service-1"
    - "token-service-2"
    - "token-service-3"

grpc:
  host: "0.0.0.0"
  port: 50051
  timeout: "300s"
  maxRecvMsgSize: 16777216
  maxSendMsgSize: 16777216
  enableReflection: true
  enableHealthCheck: true
  authTokens:
    - "token-service-1"
    - "token-service-2"
    - "token-service-3"

file:
  extractPath: "/opt/zeek_runner/extracted"
  minSizeKB: 20

otel:
  enabled: false
  endpoint: "192.168.xx.xx:14317"
